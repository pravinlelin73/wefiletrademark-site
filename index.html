<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFFFFF; color: #020617; font-family: 'Inter', sans-serif; }
        .glass-ui { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid #F1F5F9; }
        .emerald-glow { box-shadow: 0 0 40px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto glass-ui rounded-[40px] min-h-screen emerald-glow overflow-hidden">
        <nav class="p-10 flex justify-between">
            <div class="text-xl font-black uppercase">WFT.</div>
            <div class="space-x-10 text-xs font-bold uppercase tracking-widest">
                <a href="#">Engine</a> <a href="#">Pricing</a> <a href="#">Portal</a>
            </div>
        </nav>
        <div class="text-center pt-32 pb-40">
            <h1 class="text-9xl font-black tracking-tighter mb-10">THE <span class="text-emerald-500 italic">ENGINE.</span></h1>
            <div class="max-w-lg mx-auto bg-slate-50 p-2 rounded-2xl flex gap-2">
                <input class="bg-transparent flex-1 px-6 outline-none font-bold" placeholder="TRADEMARK ID">
                <button class="bg-emerald-500 text-white px-8 py-4 rounded-xl font-black text-xs uppercase">Renew Now</button>
            </div>
        </div>
    </div>
</body>
</html>
