<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFFFFF; color: #064E3B; font-family: 'Inter', sans-serif; }
        .thick-border { border: 4px solid #064E3B; }
    </style>
</head>
<body class="p-10 antialiased">
    <header class="max-w-6xl mx-auto py-20 border-b-8 border-emerald-900">
        <h1 class="text-8xl md:text-[12rem] font-black uppercase leading-none tracking-tighter">TRUTH IN <br>TRADEMARK.</h1>
    </header>
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-20 py-20">
        <p class="text-3xl font-bold leading-tight italic">We're destroying the black box. No hidden commissions. No fake legal fees. Just the law, digitized.</p>
        <div class="space-y-10">
            <input class="w-full border-b-4 border-emerald-900 py-6 text-4xl outline-none font-black uppercase" placeholder="APP NUMBER">
            <button class="bg-emerald-900 text-white w-full py-8 text-2xl font-black uppercase hover:bg-emerald-500 transition">Execute Renewal</button>
        </div>
    </div>
</body>
</html>
