<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F5F5F4; color: #262626; font-family: 'Inter', sans-serif; }
        .card-soft { background: #FFFFFF; border-radius: 40px; box-shadow: 0 4px 60px rgba(0,0,0,0.02); }
    </style>
</head>
<body class="p-8">
    <main class="max-w-5xl mx-auto card-soft p-16 mt-10">
        <div class="text-sm font-black uppercase tracking-[0.4em] text-stone-400 mb-20">Wefiletrademark / Transparency Protocol</div>
        <h1 class="text-7xl font-bold tracking-tight mb-12">Expert protection <br>without the <span class="italic text-stone-400">complexity.</span></h1>
        <div class="flex flex-col md:flex-row gap-6 mb-20">
            <div class="flex-1 bg-stone-100 p-8 rounded-3xl">
                <p class="text-[10px] font-black uppercase mb-4 text-stone-500">Service Selection</p>
                <p class="text-2xl font-bold">Trademark Renewal (TM-R)</p>
            </div>
            <div class="flex-1 bg-stone-900 text-stone-100 p-8 rounded-3xl flex items-center justify-between">
                <span class="text-xl font-bold">Start Filing</span>
                <span class="text-2xl">→</span>
            </div>
        </div>
        <p class="text-stone-400 font-medium">India's first direct-to-registry platform. Established 2026.</p>
    </main>
</body>
</html>
