<!DOCTYPE html>

<body class="antialiased">

                <div class="dropdown-menu hidden absolute top-full -left-10 w-64 bg-white border border-gray-100 rounded-3xl p-4 shadow-soft mt-2">
                    <a href="#" class="block p-4 hover:bg-gray-50 rounded-2xl font-bold text-black normal-case tracking-normal">Trademark Renewal</a>
