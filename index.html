<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .cyber-font { font-family: 'Space Grotesk', sans-serif; }
        .cyan-glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); }
        .bento-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(6, 182, 212, 0.1); backdrop-filter: blur(10px); }
        .bento-card:hover { border-color: #06b6d4; box-shadow: 0 0 30px rgba(6, 182, 212, 0.1); }
    </style>
</head>
<body class="antialiased">
    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <div class="cyber-font text-2xl font-bold tracking-tighter uppercase">WEFILE<span class="text-cyan-400">TRADEMARK</span></div>
        <div class="hidden md:flex space-x-10 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-500">
            <a href="#" class="hover:text-cyan-400">Systems</a> <a href="#" class="hover:text-cyan-400">Registry</a> <a href="#" class="hover:text-cyan-400">Protocol</a>
        </div>
    </nav>
    <header class="pt-20 pb-32 text-center px-6">
        <h1 class="cyber-font text-6xl md:text-8xl font-bold mb-8 tracking-tighter italic">RENEWAL <span class="text-cyan-400">AUTOMATED.</span></h1>
        <p class="text-slate-400 max-w-xl mx-auto mb-12 text-lg">Instant Form TM-R filing powered by our proprietary IP-Engine. Zero delays. Zero broker interference.</p>
        <div class="max-w-xl mx-auto p-2 bento-card rounded-2xl cyan-glow flex flex-col md:flex-row gap-2">
            <input class="bg-transparent flex-1 px-6 py-4 outline-none text-cyan-400 font-bold" placeholder="APPLICATION ID_">
            <button class="bg-cyan-500 text-black px-10 py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-white transition">Execute Scan</button>
        </div>
    </header>
    <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
        <div class="bento-card p-10 rounded-[30px]"><h3 class="text-cyan-400 font-bold mb-4 uppercase tracking-widest text-xs font-bold">Protocol 01</h3><p class="text-2xl font-bold">24/7 Shield Monitoring</p></div>
        <div class="bento-card p-10 rounded-[30px]"><h3 class="text-cyan-400 font-bold mb-4 uppercase tracking-widest text-xs font-bold">Protocol 02</h3><p class="text-2xl font-bold">Instant Journal Tracking</p></div>
    </div>
</body>
</html>
