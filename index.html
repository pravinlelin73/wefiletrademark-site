<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFFDF9; color: #1C1917; font-family: 'Inter', sans-serif; }
        .heritage-card { background: #FFFFFF; border: 1px solid #F1F5F9; box-shadow: 0 10px 30px rgba(245, 158, 11, 0.05); transition: 0.4s; }
        .heritage-card:hover { transform: translateY(-5px); border-color: #F59E0B; }
    </style>
</head>
<body class="antialiased">
    <nav class="max-w-7xl mx-auto p-10 flex justify-between items-center border-b border-orange-100">
        <div class="text-2xl font-black tracking-tight uppercase">WEFILE<span class="text-orange-500">TRADEMARK</span></div>
        <div class="text-[10px] font-black tracking-[0.3em] uppercase text-stone-400">Atmanirbhar IP Solutions</div>
    </nav>
    <section class="max-w-6xl mx-auto pt-32 pb-40 px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-20 items-center">
            <div>
                <div class="w-12 h-1 bg-orange-500 mb-8"></div>
                <h1 class="text-6xl md:text-7xl font-black mb-8 leading-[0.95]">Protecting the <br><span class="text-orange-500">Identity</span> of India.</h1>
                <p class="text-stone-500 text-xl mb-12">No hidden commissions. No middleman. Just expert trademark renewals for the modern Indian enterprise.</p>
                <div class="flex gap-4">
                    <input class="flex-1 border-b-2 border-stone-200 py-4 outline-none text-xl bg-transparent focus:border-orange-500 transition" placeholder="Application Number">
                    <button class="bg-stone-900 text-white px-10 py-5 rounded-full font-bold uppercase text-xs tracking-widest hover:bg-orange-500 transition">Track</button>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-6">
                <div class="heritage-card p-10 rounded-3xl">
                    <p class="text-orange-500 font-black mb-2 text-xs">RENEWALS</p>
                    <p class="text-2xl font-bold">Transparent ₹999 Fee</p>
                </div>
                <div class="heritage-card p-10 rounded-3xl">
                    <p class="text-orange-500 font-black mb-2 text-xs">WATCH SERVICE</p>
                    <p class="text-2xl font-bold">24/7 Journal Monitoring</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
